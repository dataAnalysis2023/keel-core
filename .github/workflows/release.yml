name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Crear GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ejecutar tests antes de publicar
        run: pytest tests/ -q

      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          name: "keel-core v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Instalación

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ## Actualizar instalación existente

            ```bash
            keel update
            ```

            ## Cambios

            Ver [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) para el detalle de cada hito.
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
